name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # required to create the GitHub Release

jobs:
  # Create the release with its changelog ONCE, before the build matrix —
  # concurrent release creation/body updates from matrix legs race and 404.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so the changelog can diff against the previous tag
      - name: Generate changelog from commits since the previous tag
        shell: bash
        run: |
          prev=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          {
            echo "## Changes"
            git log --no-merges --pretty='- %s (%h)' ${prev:+${prev}..}${GITHUB_REF_NAME}
            if [ -n "$prev" ]; then
              echo
              echo "**Full changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${prev}...${GITHUB_REF_NAME}"
            fi
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md
      - name: Create release with changelog
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: csm-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: csm-linux-arm64
          - os: macos-14
            target: bun-darwin-arm64
            asset: csm-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Compile standalone binary
        run: bun build --compile --minify --sourcemap=none --target=${{ matrix.target }} ./App.tsx --outfile ${{ matrix.asset }}
      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

  publish-aur:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate PKGBUILD
        run: |
          pkgver="${GITHUB_REF_NAME#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          sha_x64=$(curl -sfL "${base}/csm-linux-x64" | sha256sum | cut -d' ' -f1)
          sha_arm64=$(curl -sfL "${base}/csm-linux-arm64" | sha256sum | cut -d' ' -f1)
          sha_license=$(sha256sum LICENSE | cut -d' ' -f1)
          sed -e "s/@PKGVER@/${pkgver}/" \
              -e "s/@SHA_X64@/${sha_x64}/" \
              -e "s/@SHA_ARM64@/${sha_arm64}/" \
              -e "s/@SHA_LICENSE@/${sha_license}/" \
              packaging/aur/PKGBUILD.template > packaging/aur/PKGBUILD
          cat packaging/aur/PKGBUILD
      - name: Push to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: csm-bin
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to ${{ github.ref_name }}
